# Profil PRODUCTION — activer avec : --spring.profiles.active=prod
# Les valeurs sensibles passent par variables d'environnement (ne rien committer en clair).

# Base de données
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Schéma géré par Flyway ; Hibernate ne modifie pas la base
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=true

# HTTPS — fournir un keystore PKCS12 puis décommenter
#server.port=8443
#server.ssl.enabled=true
#server.ssl.key-store=file:/etc/dgcpt/keystore.p12
#server.ssl.key-store-type=PKCS12
#server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
#server.ssl.key-alias=dgcpt

# Cookies de session sécurisés (à activer une fois HTTPS en place)
server.servlet.session.cookie.http-only=true
#server.servlet.session.cookie.secure=true
server.servlet.session.timeout=30m

# Journaux de production
logging.level.org.hibernate.SQL=warn
logging.level.root=info
