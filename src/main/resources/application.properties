spring.application.name=missions-parc

# Base de donnees PostgreSQL (a adapter)
spring.datasource.url=jdbc:postgresql://localhost:5432/missions_parc
spring.datasource.username=missions_parc
spring.datasource.password=changeme

# Le schema est gere par Flyway ; Hibernate ne modifie pas la base
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway applique db/migration/V1__schema_initial.sql au demarrage
spring.flyway.enabled=true

server.port=8080

# Taille max d'un canevas televerse
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
