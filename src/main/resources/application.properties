spring.application.name=missions-parc

# Connexion PostgreSQL — surchargeable par variables d'environnement
# ou par src/main/resources/application-local.properties (non versionne)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/missions_parc}
spring.datasource.username=${DB_USER:missions_parc}
spring.datasource.password=${DB_PASSWORD:changeme}

server.port=${SERVER_PORT:8080}

# Le schema est gere par Flyway ; Hibernate ne modifie pas la base
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true

# Taille max des téléversements (canevas, PDF, et import de base de données)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Dossier des binaires PostgreSQL (pg_dump / pg_restore) pour l'export/import de la base via l'application.
# Vide = recherche dans le PATH (typique sous Linux). Sous Windows, définir PG_BIN, ex. :
#   PG_BIN=C:\Program Files\PostgreSQL\18\bin
app.pg-bin=${PG_BIN:}

# Supervision (Actuator) : sonde de sante (avec etat de la base) + info ; les details ne sont
# visibles que pour un utilisateur autorise (cf. SecurityConfig : /actuator/** reserve a l'ADMIN).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Surcharge locale (non versionnee) : creez application-local.properties a cote de ce fichier
spring.config.import=optional:classpath:application-local.properties
