<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Agent</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1 th:text="${mode == 'creation'} ? 'Nouvel agent' : 'Modifier un agent'">Agent</h1>

    <p th:if="${message}" class="alert ok" th:text="${message}"></p>

    <div class="card">
        <p th:if="${erreur}" class="alert err" th:text="${erreur}">erreur</p>
        <form method="post"
              th:action="${mode == 'creation'} ? @{/agents} : @{/agents/{m}(m=${form.matricule})}"
              th:object="${form}">
            <div class="form-row"><label>Matricule <span class="req">*</span></label>
                <input type="text" th:field="*{matricule}" th:errorclass="input-err" required th:readonly="${mode == 'modification'}"/>
                <p class="field-err" th:if="${#fields.hasErrors('matricule')}" th:errors="*{matricule}"></p></div>
            <div class="form-row"><label>Nom <span class="req">*</span></label>
                <input type="text" th:field="*{nom}" th:errorclass="input-err" required/>
                <p class="field-err" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></p></div>
            <div class="form-row"><label>Prénom</label>
                <input type="text" th:field="*{prenom}" th:errorclass="input-err"/>
                <p class="field-err" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></p></div>
            <div class="form-row"><label>Fonction</label>
                <input type="text" th:field="*{fonction}" th:errorclass="input-err"/>
                <p class="field-err" th:if="${#fields.hasErrors('fonction')}" th:errors="*{fonction}"></p></div>
            <div class="form-row"><label>Téléphone</label>
                <input type="text" th:field="*{telephone}" th:errorclass="input-err"/>
                <p class="field-err" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></p></div>
            <div class="form-row"><label>E-mail</label>
                <input type="email" th:field="*{email}" th:errorclass="input-err"/>
                <p class="field-err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p></div>
            <div class="form-row"><label>Type <span class="req">*</span></label>
                <select id="typeAgent" th:field="*{typeAgent}" onchange="toggleTpr()">
                    <option value="POSTE">Agent de poste (TPR)</option>
                    <option value="INFORMATICIEN">Informaticien (Direction Informatique)</option>
                </select></div>
            <div id="tpr-bloc" class="form-row"><label>TPR (poste) <span class="req">*</span></label>
                <select th:field="*{posteId}">
                    <option value="">— Choisir —</option>
                    <option th:each="p : ${postes}" th:value="${p.id}" th:text="${p.code + ' — ' + p.nom}"></option>
                </select></div>
            <div class="toolbar mt-1">
                <button class="btn" type="submit">Enregistrer</button>
                <a class="btn secondary" th:href="@{/agents}">Annuler</a>
            </div>
        </form>
    </div>

    <div class="card" th:if="${mode == 'modification' and form.typeAgent == 'POSTE'}">
        <h2 class="flush">Mutation vers un autre poste</h2>
        <p class="muted" style="margin-top:-.3rem">Change le TPR de rattachement de l'agent, avec date d'effet (historisé). Le matériel reste dans son poste.</p>
        <form method="post" th:action="@{/agents/{m}/muter(m=${form.matricule})}">
            <div class="form-row"><label>Nouveau TPR <span class="req">*</span></label>
                <select name="poste" required>
                    <option value="">— Choisir —</option>
                    <option th:each="p : ${postes}" th:value="${p.id}" th:text="${p.code + ' — ' + p.nom}"></option>
                </select></div>
            <div class="form-row"><label>Date d'effet</label><input type="date" name="date"/></div>
            <button class="btn" type="submit">Muter</button>
        </form>

        <h3>Historique des rattachements</h3>
        <table class="table">
            <thead><tr><th>Poste (TPR)</th><th>Depuis</th><th>Jusqu'à</th></tr></thead>
            <tbody>
                <tr th:each="h : ${historique}"><td th:text="${h[0]}"></td><td th:text="${h[1]}"></td><td th:text="${h[2]}"></td></tr>
                <tr th:if="${historique == null or historique.isEmpty()}"><td colspan="3" class="empty">Aucun rattachement enregistré.</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function toggleTpr() {
            var t = document.getElementById('typeAgent').value;
            document.getElementById('tpr-bloc').style.display = (t === 'POSTE') ? 'flex' : 'none';
        }
        document.addEventListener('DOMContentLoaded', toggleTpr);
    </script>
</main>
</body>
</html>
