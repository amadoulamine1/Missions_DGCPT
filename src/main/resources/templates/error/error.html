<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Erreur</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1 th:text="${status != null} ? ('Erreur ' + ${status}) : 'Erreur'">Erreur</h1>
    <div class="card">
        <p th:text="${error} ?: 'Une erreur est survenue.'">Une erreur est survenue.</p>
        <p style="margin-top:1rem"><a class="btn" th:href="@{/}">← Retour au tableau de bord</a></p>
    </div>
</main>
</body>
</html>
