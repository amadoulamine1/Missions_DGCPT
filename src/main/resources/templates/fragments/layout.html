<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>
<nav class="topbar" th:fragment="nav">
    <a class="brand" th:href="@{/}">DGCPT · Parc &amp; Missions</a>
    <div class="links">
        <a th:href="@{/}">Accueil</a>
        <a th:href="@{/postes}" th:if="${currentRole == 'ADMIN'}">Postes</a>
        <a th:href="@{/agents}" th:if="${currentRole == 'ADMIN'}">Agents</a>
        <a th:href="@{/parc}">Parc</a>
        <a th:href="@{/missions}">Missions</a>
        <a th:href="@{/import}">Importer</a>
        <a th:href="@{/import/guide}">Guide</a>
        <a th:href="@{/utilisateurs}" th:if="${currentRole == 'ADMIN'}">Comptes</a>
    </div>
    <div class="userbox" th:if="${currentUser != null}">
        <span th:text="${currentUser}">user</span>
        <form method="post" th:action="@{/logout}" style="display:inline;margin:0">
            <button class="btn small secondary" type="submit">Déconnexion</button>
        </form>
    </div>
</nav>
</body>
</html>
