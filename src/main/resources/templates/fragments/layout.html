<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>
<nav class="topbar" th:fragment="nav" aria-label="Navigation principale">
    <a class="brand" th:href="@{/}">DGCPT<br/><span class="brand-sub">Parc &amp; Missions</span></a>
    <div class="links">
        <a th:href="@{/}" th:classappend="${currentPath == '/'} ? 'active'"
           th:attr="aria-current=${currentPath == '/'} ? 'page' : null">
            <svg viewBox="0 0 24 24"><path d="M3 11.4 12 4l9 7.4"/><path d="M5.5 10v9.5h13V10"/></svg><span>Accueil</span></a>
        <a th:href="@{/postes}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/postes')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/postes')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="1"/><path d="M9 21v-4h6v4"/><path d="M9 7h.5M14.5 7h.5M9 11h.5M14.5 11h.5"/></svg><span>Postes</span></a>
        <a th:href="@{/agents}" th:if="${currentRole == 'ADMIN' or currentRole == 'MANAGER'}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/agents')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/agents')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.5a3 3 0 0 1 0 5.6"/><path d="M17.5 20a5.5 5.5 0 0 0-2-4.4"/></svg><span>Agents</span></a>
        <a th:href="@{/parc}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/parc')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/parc')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="6" rx="1"/><rect x="3" y="13" width="18" height="6" rx="1"/><path d="M7 8h.5M7 16h.5"/></svg><span>Parc</span></a>
        <a th:href="@{/missions}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/missions')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/missions')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3h6v1"/><path d="M8.5 11l2 2 4-4"/></svg><span>Missions</span></a>
        <a th:href="@{/rapport-annuel}" th:if="${currentRole == 'ADMIN' or currentRole == 'MANAGER'}"
           th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/rapport-annuel')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/rapport-annuel')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><path d="M6 4h9l4 4v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M9 17v-4M12 17v-6M15 17v-2"/></svg><span>Rapport annuel</span></a>
        <a th:href="@{/import}" th:if="${currentRole != 'MANAGER'}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/import') and !#strings.startsWith(currentPath,'/import/guide')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/import') and !#strings.startsWith(currentPath,'/import/guide')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 15.5V19h14v-3.5"/></svg><span>Importer</span></a>
        <a th:href="@{/import/guide}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/import/guide')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/import/guide')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><path d="M5 4h11a2 2 0 0 1 2 2v14H7a2 2 0 0 1-2-2z"/><path d="M5 18a2 2 0 0 1 2-2h11"/></svg><span>Guide</span></a>
        <a th:href="@{/referentiels}" th:if="${currentRole == 'ADMIN'}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/referentiels')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/referentiels')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><path d="M4 7h10M4 12h16M4 17h7"/><circle cx="18" cy="7" r="2"/><circle cx="9" cy="17" r="2"/></svg><span>Référentiels</span></a>
        <a th:href="@{/utilisateurs}" th:if="${currentRole == 'ADMIN'}" th:classappend="${currentPath != null and #strings.startsWith(currentPath,'/utilisateurs')} ? 'active'"
           th:attr="aria-current=${currentPath != null and #strings.startsWith(currentPath,'/utilisateurs')} ? 'page' : null">
            <svg viewBox="0 0 24 24"><circle cx="8" cy="12" r="4"/><path d="M11 12h9M17 12v3M20 12v2.5"/></svg><span>Comptes</span></a>
    </div>
    <div class="userbox" th:if="${currentUser != null}">
        <span th:text="${currentUser}">user</span>
        <a class="btn small secondary" th:href="@{/mon-mot-de-passe}" style="text-align:center">Mot de passe</a>
        <form method="post" th:action="@{/logout}" style="margin:0">
            <button class="btn small secondary" type="submit">Déconnexion</button>
        </form>
    </div>
</nav>
</body>
</html>
