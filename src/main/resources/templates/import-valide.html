<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Import validé</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1>Import validé</h1>
    <div class="card">
        <p class="alert ok">Le canevas de la mission <strong th:text="${reference}">M-…</strong> a été validé.</p>
        <p><strong th:text="${nbMateriels}">0</strong> matériel(s) et <strong th:text="${nbMembres}">0</strong> membre(s) pris en compte.</p>
        <p class="muted">Les données ont été intégrées en base : matériel créé ou mis à jour (numéros attribués aux nouveaux), affectations historisées et relevé daté rattaché à la mission.</p>
        <div class="toolbar mt-1">
            <a class="btn" th:href="@{/import}">Nouvel import</a>
            <a class="btn secondary" th:href="@{/parc}">Voir le parc</a>
        </div>
    </div>
</main>
</body>
</html>
