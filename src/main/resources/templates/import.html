<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Importer</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1>Importer un canevas</h1>
    <div class="toolbar">
        <a class="btn" th:href="@{/import/canevas}">⬇ Télécharger un canevas vierge</a>
        <a class="btn secondary" th:href="@{/import/guide}">Guide d'utilisation</a>
    </div>
    <div class="card">
        <h2 style="margin-top:0;border:none">Analyser un canevas rempli</h2>
        <p th:if="${erreur}" class="alert err" th:text="${erreur}">erreur</p>
        <form method="post" th:action="@{/import}" enctype="multipart/form-data">
            <div class="form-row"><label>Fichier .xlsx</label><input type="file" name="fichier" accept=".xlsx" required/></div>
            <button class="btn" type="submit">Analyser</button>
        </form>
    </div>
</main>
</body>
</html>
