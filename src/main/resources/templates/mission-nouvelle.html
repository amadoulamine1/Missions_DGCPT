<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Nouvelle mission</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1>Nouvelle mission</h1>
    <p class="muted">Le N° de mission est généré automatiquement. Vous pourrez ensuite télécharger le canevas pré-rempli à distribuer aux agents.</p>
    <div class="card">
        <form method="post" th:action="@{/missions/nouvelle}" th:object="${form}">
            <div class="form-row"><label>Code poste <span class="req">*</span></label><input type="text" th:field="*{codePoste}" required/></div>
            <div class="form-row"><label>Nom du poste</label><input type="text" th:field="*{nomPoste}"/></div>
            <div class="form-row"><label>Objet de la mission <span class="req">*</span></label><input type="text" th:field="*{objet}" required/></div>
            <div class="form-row"><label>Date de début</label><input type="date" th:field="*{dateDebut}"/></div>
            <div class="form-row"><label>Date de fin</label><input type="date" th:field="*{dateFin}"/></div>
            <div class="form-row"><label>Chef de mission (matricule) <span class="req">*</span></label><input type="text" th:field="*{chefMission}" required/></div>
            <div class="form-row"><label>Chef de poste (matricule) <span class="req">*</span></label><input type="text" th:field="*{chefPoste}" required/></div>
            <div class="toolbar" style="margin-top:1rem">
                <button class="btn" type="submit">Créer la mission</button>
                <a class="btn secondary" th:href="@{/missions}">Annuler</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
