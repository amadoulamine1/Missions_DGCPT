<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Missions</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <header class="page-head">
        <div>
            <p class="eyebrow">Missions d'inventaire</p>
            <h1>Missions</h1>
        </div>
        <div class="actions no-print" th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}">
            <button class="btn secondary" type="button" onclick="telechargerLot()">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 19h14"/></svg>Télécharger la sélection</button>
            <a class="btn" th:href="@{/missions/nouvelle}">+ Nouvelle mission</a>
        </div>
    </header>

    <p th:if="${message}" class="alert ok no-print" th:text="${message}">ok</p>
    <p th:if="${erreur}" class="alert err no-print" th:text="${erreur}">err</p>

    <form method="get" th:action="@{/missions}" class="filterbar no-print">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher (n°, objet)…" aria-label="Rechercher une mission"/>
        <select name="poste" aria-label="Filtrer par poste">
            <option value="">Tous les postes</option>
            <option th:each="p : ${postes}" th:value="${p.id}" th:text="${p.nom}" th:selected="${fPoste != null and fPoste == p.id}"></option>
        </select>
        <select name="region" aria-label="Filtrer par région">
            <option value="">Toutes les régions</option>
            <option th:each="r : ${regions}" th:value="${r}" th:text="${r}" th:selected="${fRegion == r}"></option>
        </select>
        <select name="agent" aria-label="Filtrer par agent de mission">
            <option value="">Tous les agents</option>
            <option th:each="a : ${agents}" th:value="${a.matricule}" th:text="${a.matricule + ' — ' + a.nomComplet}" th:selected="${fAgent == a.matricule}"></option>
        </select>
        <select name="etat" aria-label="Filtrer par état">
            <option value="">Tous les états</option>
            <option value="Planifiée" th:selected="${fEtat == 'Planifiée'}">Planifiée</option>
            <option value="En cours" th:selected="${fEtat == 'En cours'}">En cours</option>
            <option value="Terminée" th:selected="${fEtat == 'Terminée'}">Terminée</option>
        </select>
        <button class="btn small" type="submit">Filtrer</button>
        <a class="btn secondary small" th:href="@{/missions}">Réinitialiser</a>
        <span class="count"><b th:text="${page.total}">0</b> mission(s)</span>
    </form>

    <div class="table-scroll">
    <table class="table sticky">
        <thead><tr>
            <th scope="col" th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}" style="width:1%">
                <input type="checkbox" id="selAll" onclick="toggleAll(this)" aria-label="Tout sélectionner"/></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri='ref',sens=${(tri == 'ref' and sens != 'desc') ? 'desc' : 'asc'})}">N° mission</a><span th:if="${tri == 'ref'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri='objet',sens=${(tri == 'objet' and sens != 'desc') ? 'desc' : 'asc'})}">Objet</a><span th:if="${tri == 'objet'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri='poste',sens=${(tri == 'poste' and sens != 'desc') ? 'desc' : 'asc'})}">Poste</a><span th:if="${tri == 'poste'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col">Période</th>
            <th scope="col">Agents</th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri='etat',sens=${(tri == 'etat' and sens != 'desc') ? 'desc' : 'asc'})}">État</a><span th:if="${tri == 'etat'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri='statut',sens=${(tri == 'statut' and sens != 'desc') ? 'desc' : 'asc'})}">Statut</a><span th:if="${tri == 'statut'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col" class="no-print">Ordre de mission</th>
        </tr></thead>
        <tbody>
            <tr th:each="m : ${missions}">
                <td th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}">
                    <input type="checkbox" class="sel-mission" th:value="${m.id}" th:attr="aria-label=|Sélectionner ${m.reference}|"/></td>
                <td><a class="mono" th:href="@{/missions/{id}(id=${m.id})}" th:text="${m.reference}"></a></td>
                <td th:text="${m.objet}"></td><td th:text="${m.posteNom}"></td><td th:text="${m.periode}"></td>
                <td class="agents" th:text="${#strings.isEmpty(m.agents) ? '—' : m.agents}">—</td>
                <td><span class="badge" th:classappend="${m.etat == 'En cours' ? 'orange' : (m.etat == 'Terminée' ? 'green' : 'blue')}" th:text="${m.etat}"></span></td>
                <td><span class="badge" th:classappend="${m.statut == 'CLOTUREE'} ? 'green' : 'gold'" th:text="${m.statut}"></span></td>
                <td class="no-print ordre">
                    <span th:if="${m.ordres.isEmpty()}" class="muted">—</span>
                    <span th:each="o : ${m.ordres}" class="ordre-item">
                        <a class="filechip" th:href="@{/missions/{id}/ordre/{oid}(id=${m.id},oid=${o.id})}" target="_blank" rel="noopener" th:title="${o.nom}">
                            <svg viewBox="0 0 24 24" aria-hidden="true" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span class="fn" th:text="${o.nom}">fichier.pdf</span></a>
                        <form th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}" method="post"
                              th:action="@{/missions/{id}/ordre/{oid}/supprimer(id=${m.id},oid=${o.id})}" style="display:inline"
                              onsubmit="return confirm('Supprimer cet ordre de mission ?');">
                            <button class="btn small ghost" type="submit" title="Supprimer cet ordre de mission">✕</button>
                        </form>
                    </span>
                    <span th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}" class="ordre-actions">
                        <form method="post" enctype="multipart/form-data" th:action="@{/missions/{id}/ordre(id=${m.id})}" style="display:inline">
                            <label class="btn small secondary filebtn">Joindre
                                <input type="file" name="fichier" accept="application/pdf,.pdf" hidden onchange="if(this.files.length){this.form.submit();}"/>
                            </label>
                        </form>
                    </span>
                </td>
            </tr>
            <tr th:if="${page.vide}"><td th:colspan="${(currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION') ? 9 : 8}" class="empty">Aucune mission.</td></tr>
        </tbody>
    </table>
    </div>

    <div class="toolbar no-print" th:if="${page.totalPages > 1}" style="margin-top:.6rem">
        <a class="btn small secondary" th:classappend="${page.premier} ? 'disabled' : ''"
           th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri=${tri},sens=${sens},page=${page.precedent})}">← Précédent</a>
        <span class="muted" th:text="'Page ' + ${page.pageHumain} + ' / ' + ${page.totalPages}"></span>
        <a class="btn small secondary" th:classappend="${page.dernier} ? 'disabled' : ''"
           th:href="@{/missions(q=${q},poste=${fPoste},region=${fRegion},agent=${fAgent},etat=${fEtat},tri=${tri},sens=${sens},page=${page.suivant})}">Suivant →</a>
    </div>

    <script th:inline="javascript" th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}">
        var URL_LOT = /*[[@{/missions/canevas}]]*/ '/missions/canevas';
        function toggleAll(cb){ document.querySelectorAll('.sel-mission').forEach(function(x){ x.checked = cb.checked; }); }
        function telechargerLot(){
            var ids = Array.from(document.querySelectorAll('.sel-mission:checked')).map(function(x){ return x.value; });
            if (ids.length === 0) { alert('Sélectionnez au moins une mission à télécharger.'); return; }
            window.location = URL_LOT + '?id=' + ids.join('&id=');
        }
    </script>
</main>
</body>
</html>
