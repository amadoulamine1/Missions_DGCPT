<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Missions</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <div class="toolbar">
        <h1 style="margin:0">Missions</h1>
        <span class="spacer"></span>
        <a class="btn" th:href="@{/missions/nouvelle}" th:if="${currentRole == 'ADMIN' or currentRole == 'CHEF_MISSION'}">+ Nouvelle mission</a>
    </div>
    <form method="get" th:action="@{/missions}" class="toolbar" style="flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem">
        <input type="text" name="q" th:value="${q}" placeholder="Rechercher (n°, objet)…" style="min-width:200px"/>
        <select name="poste">
            <option value="">Tous les postes</option>
            <option th:each="p : ${postes}" th:value="${p.id}" th:text="${p.nom}" th:selected="${fPoste != null and fPoste == p.id}"></option>
        </select>
        <select name="etat">
            <option value="">Tous les états</option>
            <option value="Planifiée" th:selected="${fEtat == 'Planifiée'}">Planifiée</option>
            <option value="En cours" th:selected="${fEtat == 'En cours'}">En cours</option>
            <option value="Terminée" th:selected="${fEtat == 'Terminée'}">Terminée</option>
        </select>
        <button class="btn" type="submit">Filtrer</button>
        <a class="btn secondary" th:href="@{/missions}">Réinitialiser</a>
    </form>
    <p class="muted"><span th:text="${page.total}">0</span> mission(s)</p>
    <table class="table">
        <thead><tr>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri='ref',sens=${(tri == 'ref' and sens != 'desc') ? 'desc' : 'asc'})}">N° mission</a><span th:if="${tri == 'ref'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri='objet',sens=${(tri == 'objet' and sens != 'desc') ? 'desc' : 'asc'})}">Objet</a><span th:if="${tri == 'objet'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri='poste',sens=${(tri == 'poste' and sens != 'desc') ? 'desc' : 'asc'})}">Poste</a><span th:if="${tri == 'poste'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col">Période</th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri='etat',sens=${(tri == 'etat' and sens != 'desc') ? 'desc' : 'asc'})}">État</a><span th:if="${tri == 'etat'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri='statut',sens=${(tri == 'statut' and sens != 'desc') ? 'desc' : 'asc'})}">Statut</a><span th:if="${tri == 'statut'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
        </tr></thead>
        <tbody>
            <tr th:each="m : ${missions}">
                <td><a th:href="@{/missions/{id}(id=${m.id})}" th:text="${m.reference}"></a></td>
                <td th:text="${m.objet}"></td><td th:text="${m.posteNom}"></td><td th:text="${m.periode}"></td>
                <td><span class="badge" th:classappend="${m.etat == 'En cours' ? 'orange' : (m.etat == 'Terminée' ? 'green' : 'blue')}" th:text="${m.etat}"></span></td>
                <td><span class="badge" th:classappend="${m.statut == 'CLOTUREE'} ? 'green' : 'gold'" th:text="${m.statut}"></span></td>
            </tr>
            <tr th:if="${page.vide}"><td colspan="6" class="empty">Aucune mission.</td></tr>
        </tbody>
    </table>
    <div class="toolbar" th:if="${page.totalPages > 1}" style="margin-top:.6rem">
        <a class="btn small secondary" th:classappend="${page.premier} ? 'disabled' : ''"
           th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri=${tri},sens=${sens},page=${page.precedent})}">← Précédent</a>
        <span class="muted" th:text="'Page ' + ${page.pageHumain} + ' / ' + ${page.totalPages}"></span>
        <a class="btn small secondary" th:classappend="${page.dernier} ? 'disabled' : ''"
           th:href="@{/missions(q=${q},poste=${fPoste},etat=${fEtat},tri=${tri},sens=${sens},page=${page.suivant})}">Suivant →</a>
    </div>
</main>
</body>
</html>
