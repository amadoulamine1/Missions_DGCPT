<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Parc</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container wide">
    <header class="page-head">
        <div>
            <p class="eyebrow">Parc informatique</p>
            <h1>Inventaire du parc</h1>
        </div>
        <div class="actions no-print">
            <a class="btn secondary small" th:href="@{/inventaire}"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M8 3v4M16 3v4M4 9h16"/></svg>Inventaire à une date</a>
            <a class="btn secondary small" th:href="@{/parc/export(q=${q},poste=${fPoste},type=${fType},statut=${fStatut})}"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 19h14"/></svg>Export Excel</a>
            <a class="btn secondary small" th:href="@{/parc/etiquettes(q=${q},poste=${fPoste},type=${fType},statut=${fStatut})}"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12V4h8l9 9-7 7-9-9z"/><circle cx="7.5" cy="7.5" r="1.2"/></svg>Étiquettes</a>
        </div>
    </header>

    <form method="get" th:action="@{/parc}" class="filterbar no-print">
        <span class="search">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true"><circle cx="6.5" cy="6.5" r="4.5" stroke="#9aa0a6" stroke-width="1.4"/><path d="M10 10l3.5 3.5" stroke="#9aa0a6" stroke-width="1.4" stroke-linecap="round"/></svg>
            <input type="text" name="q" th:value="${q}" placeholder="N° inv., nom, modèle…" aria-label="Rechercher dans le parc"/>
        </span>
        <select name="poste" onchange="this.form.submit()" aria-label="Filtrer par poste">
            <option value="">Tous les postes</option>
            <option th:each="p : ${postes}" th:value="${p.id}" th:text="${p.nom}" th:selected="${fPoste != null and fPoste == p.id}"></option>
        </select>
        <input type="hidden" name="type" th:value="${fType}"/>
        <input type="hidden" name="statut" th:value="${fStatut}"/>
        <button class="btn small" type="submit">Rechercher</button>
        <span class="count"><b th:text="${page.total}">0</b> matériel(s)</span>
    </form>

    <div class="chiprow no-print">
        <span class="lbl">Type</span>
        <a class="chip sm" th:classappend="${fType == null or fType == ''} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},statut=${fStatut})}">Tous</a>
        <a class="chip sm" th:each="t : ${types}" th:classappend="${fType == t} ? 'active'"
           th:href="@{/parc(q=${q},poste=${fPoste},type=${t},statut=${fStatut})}" th:text="${t}"></a>
    </div>
    <div class="chiprow no-print" style="margin-bottom:1rem">
        <span class="lbl">Statut</span>
        <a class="chip sm" th:classappend="${fStatut == null or fStatut == ''} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType})}">Tous</a>
        <a class="chip sm" th:classappend="${fStatut == 'EN_SERVICE'} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut='EN_SERVICE')}">En service</a>
        <a class="chip sm" th:classappend="${fStatut == 'EN_PANNE'} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut='EN_PANNE')}">En panne</a>
        <a class="chip sm" th:classappend="${fStatut == 'A_CHANGER'} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut='A_CHANGER')}">À changer</a>
    </div>

    <div class="table-scroll">
    <table class="table sticky">
        <thead><tr>
            <th scope="col"><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='numero',sens=${(tri == 'numero' and sens != 'desc') ? 'desc' : 'asc'})}">N° inventaire</a><span th:if="${tri == 'numero'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='nom',sens=${(tri == 'nom' and sens != 'desc') ? 'desc' : 'asc'})}">Nom</a><span th:if="${tri == 'nom'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='type',sens=${(tri == 'type' and sens != 'desc') ? 'desc' : 'asc'})}">Type</a><span th:if="${tri == 'type'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='modele',sens=${(tri == 'modele' and sens != 'desc') ? 'desc' : 'asc'})}">Modèle</a><span th:if="${tri == 'modele'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col">RAM</th>
            <th scope="col">Processeur</th>
            <th scope="col">Disque</th>
            <th scope="col"><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='poste',sens=${(tri == 'poste' and sens != 'desc') ? 'desc' : 'asc'})}">Poste</a><span th:if="${tri == 'poste'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th scope="col"><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='statut',sens=${(tri == 'statut' and sens != 'desc') ? 'desc' : 'asc'})}">Statut</a><span th:if="${tri == 'statut'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
        </tr></thead>
        <tbody>
            <tr th:each="m : ${materiels}">
                <td>
                    <span class="cell-mat">
                        <span class="glyph" th:classappend="${m.famille == 'ORDINATEUR' ? 't-ord' : (m.famille == 'IMPRIMANTE' ? 't-imp' : ((m.famille == 'SWITCH' or m.famille == 'ACCESS_POINT') ? 't-net' : (m.famille == 'SCANNER_CHEQUE' ? 't-scn' : 't-aut')))}"
                              th:text="${m.famille == 'ORDINATEUR' ? 'O' : (m.famille == 'IMPRIMANTE' ? 'I' : (m.famille == 'SWITCH' ? 'S' : (m.famille == 'ACCESS_POINT' ? 'A' : (m.famille == 'SCANNER_CHEQUE' ? 'C' : '•'))))}">O</span>
                        <a class="mono" th:href="@{/parc/{n}(n=${m.numeroInventaire})}" th:text="${m.numeroInventaire}"></a>
                    </span>
                </td>
                <td th:text="${m.nom}" th:title="${m.observation}"></td>
                <td th:text="${m.type}"></td>
                <td th:text="${m.modele}"></td>
                <td class="tech" th:text="${m.ram}"></td>
                <td class="tech" th:text="${m.processeur}"></td>
                <td class="tech" th:text="${m.disqueDur}"></td>
                <td th:text="${m.posteNom}"></td>
                <td><span th:if="${m.statut != ''}" class="badge" th:classappend="${m.statut == 'En service' ? 'green' : (m.statut == 'En panne' ? 'red' : 'orange')}" th:text="${m.statut}"></span></td>
            </tr>
            <tr th:if="${page.vide}"><td colspan="9" class="empty">Aucun matériel ne correspond à ces filtres.</td></tr>
        </tbody>
    </table>
    </div>

    <div class="toolbar no-print" th:if="${page.totalPages > 1}" style="margin-top:.6rem">
        <a class="btn small secondary" th:classappend="${page.premier} ? 'disabled' : ''"
           th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri=${tri},sens=${sens},page=${page.precedent})}">← Précédent</a>
        <span class="muted" th:text="'Page ' + ${page.pageHumain} + ' / ' + ${page.totalPages}"></span>
        <a class="btn small secondary" th:classappend="${page.dernier} ? 'disabled' : ''"
           th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri=${tri},sens=${sens},page=${page.suivant})}">Suivant →</a>
    </div>
</main>
</body>
</html>
