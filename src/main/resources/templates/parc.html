<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Parc</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1>Inventaire du parc</h1>

    <form method="get" th:action="@{/parc}" class="filters">
        <span class="search">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#9aa0a6" stroke-width="1.4"/><path d="M10 10l3.5 3.5" stroke="#9aa0a6" stroke-width="1.4" stroke-linecap="round"/></svg>
            <input type="text" name="q" th:value="${q}" placeholder="N° inv., nom, modèle…"/>
        </span>
        <select name="poste" onchange="this.form.submit()">
            <option value="">Tous les postes</option>
            <option th:each="p : ${postes}" th:value="${p.id}" th:text="${p.nom}" th:selected="${fPoste != null and fPoste == p.id}"></option>
        </select>
        <input type="hidden" name="type" th:value="${fType}"/>
        <input type="hidden" name="statut" th:value="${fStatut}"/>
        <button class="btn" type="submit">Rechercher</button>
        <span class="spacer"></span>
        <a class="btn secondary small" th:href="@{/inventaire}">Inventaire à une date</a>
        <a class="btn secondary small" th:href="@{/parc/export(q=${q},poste=${fPoste},type=${fType},statut=${fStatut})}">⬇ Export</a>
        <a class="btn secondary small" th:href="@{/parc/etiquettes(q=${q},poste=${fPoste},type=${fType},statut=${fStatut})}">🏷 Étiquettes</a>
    </form>

    <div class="chips" style="margin-bottom:.5rem">
        <a class="chip" th:classappend="${fType == null or fType == ''} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},statut=${fStatut})}">Tous types</a>
        <a class="chip" th:each="t : ${types}" th:classappend="${fType == t.name()} ? 'active'"
           th:href="@{/parc(q=${q},poste=${fPoste},type=${t},statut=${fStatut})}"
           th:text="${#strings.capitalize(#strings.replace(#strings.toLowerCase(t),'_',' '))}"></a>
    </div>
    <div class="chips" style="margin-bottom:1rem">
        <a class="chip sm" th:classappend="${fStatut == null or fStatut == ''} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType})}">Tous statuts</a>
        <a class="chip sm" th:classappend="${fStatut == 'EN_SERVICE'} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut='EN_SERVICE')}">En service</a>
        <a class="chip sm" th:classappend="${fStatut == 'EN_PANNE'} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut='EN_PANNE')}">En panne</a>
        <a class="chip sm" th:classappend="${fStatut == 'A_CHANGER'} ? 'active'" th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut='A_CHANGER')}">À changer</a>
    </div>

    <p class="muted"><span th:text="${page.total}">0</span> matériel(s)</p>
    <table class="table">
        <thead><tr>
            <th><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='numero',sens=${(tri == 'numero' and sens != 'desc') ? 'desc' : 'asc'})}">N° inventaire</a><span th:if="${tri == 'numero'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='nom',sens=${(tri == 'nom' and sens != 'desc') ? 'desc' : 'asc'})}">Nom</a><span th:if="${tri == 'nom'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='type',sens=${(tri == 'type' and sens != 'desc') ? 'desc' : 'asc'})}">Type</a><span th:if="${tri == 'type'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='modele',sens=${(tri == 'modele' and sens != 'desc') ? 'desc' : 'asc'})}">Modèle</a><span th:if="${tri == 'modele'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='poste',sens=${(tri == 'poste' and sens != 'desc') ? 'desc' : 'asc'})}">Poste</a><span th:if="${tri == 'poste'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
            <th><a th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri='statut',sens=${(tri == 'statut' and sens != 'desc') ? 'desc' : 'asc'})}">Statut</a><span th:if="${tri == 'statut'}" th:text="${sens == 'desc' ? ' ▼' : ' ▲'}"></span></th>
        </tr></thead>
        <tbody>
            <tr th:each="m : ${materiels}">
                <td>
                    <span class="cell-mat">
                        <span class="glyph" th:classappend="${m.type == 'ORDINATEUR' ? 't-ord' : (m.type == 'IMPRIMANTE' ? 't-imp' : ((m.type == 'SWITCH' or m.type == 'ACCESS_POINT') ? 't-net' : (m.type == 'SCANNER_CHEQUE' ? 't-scn' : 't-aut')))}"
                              th:text="${m.type == 'ORDINATEUR' ? 'O' : (m.type == 'IMPRIMANTE' ? 'I' : (m.type == 'SWITCH' ? 'S' : (m.type == 'ACCESS_POINT' ? 'A' : (m.type == 'SCANNER_CHEQUE' ? 'C' : '•'))))}">O</span>
                        <a class="mono" th:href="@{/parc/{n}(n=${m.numeroInventaire})}" th:text="${m.numeroInventaire}"></a>
                    </span>
                </td>
                <td th:text="${m.nom}"></td>
                <td th:text="${#strings.capitalize(#strings.replace(#strings.toLowerCase(m.type),'_',' '))}"></td>
                <td th:text="${m.modele}"></td>
                <td th:text="${m.posteNom}"></td>
                <td><span th:if="${m.statut != ''}" class="badge" th:classappend="${m.statut == 'En service' ? 'green' : (m.statut == 'En panne' ? 'red' : 'orange')}" th:text="${m.statut}"></span></td>
            </tr>
            <tr th:if="${page.vide}"><td colspan="6" class="empty">Aucun matériel ne correspond à ces filtres.</td></tr>
        </tbody>
    </table>

    <div class="toolbar" th:if="${page.totalPages > 1}" style="margin-top:.6rem">
        <a class="btn small secondary" th:classappend="${page.premier} ? 'disabled' : ''"
           th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri=${tri},sens=${sens},page=${page.precedent})}">← Précédent</a>
        <span class="muted" th:text="'Page ' + ${page.pageHumain} + ' / ' + ${page.totalPages}"></span>
        <a class="btn small secondary" th:classappend="${page.dernier} ? 'disabled' : ''"
           th:href="@{/parc(q=${q},poste=${fPoste},type=${fType},statut=${fStatut},tri=${tri},sens=${sens},page=${page.suivant})}">Suivant →</a>
    </div>
</main>
</body>
</html>
