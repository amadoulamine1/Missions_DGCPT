<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Parc</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <h1>Inventaire du parc</h1>
    <p class="muted">Total : <span th:text="${materiels.size()}">0</span> matériel(s)</p>
    <table class="table">
        <thead><tr><th>N° inventaire</th><th>Type</th><th>Nom</th><th>Modèle</th><th>Poste</th><th>Statut</th></tr></thead>
        <tbody>
            <tr th:each="m : ${materiels}">
                <td th:text="${m.numeroInventaire}"></td><td th:text="${m.type}"></td>
                <td th:text="${m.nom}"></td><td th:text="${m.modele}"></td><td th:text="${m.posteNom}"></td><td><span th:if="${m.statut != ''}" class="badge" th:classappend="${m.statut == 'En service' ? 'green' : (m.statut == 'En panne' ? 'red' : 'orange')}" th:text="${m.statut}"></span></td>
            </tr>
            <tr th:if="${materiels.isEmpty()}"><td colspan="6" class="empty">Parc vide.</td></tr>
        </tbody>
    </table>
</main>
</body>
</html>
