<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Poste</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <div class="toolbar">
        <h1 style="margin:0" th:text="${d.poste.nom}">Poste</h1>
        <span class="spacer"></span>
        <a class="btn secondary" th:href="@{/postes/{id}/modifier(id=${d.poste.id})}">Modifier</a>
    </div>
    <div class="card">
        <table class="kv">
            <tr><td class="k">Code</td><td th:text="${d.poste.code}"></td></tr>
            <tr><td class="k">Région</td><td th:text="${d.poste.region}"></td></tr>
            <tr><td class="k">Chef de poste actuel</td><td><strong th:text="${d.chefActuel}"></strong></td></tr>
        </table>
    </div>
    <h2>Agents du poste</h2>
    <table class="table">
        <thead><tr><th>Matricule</th><th>Nom</th><th>Fonction</th><th>Téléphone</th></tr></thead>
        <tbody>
            <tr th:each="a : ${d.agents}">
                <td th:text="${a.matricule}"></td><td th:text="${a.nomComplet}"></td>
                <td th:text="${a.fonction}"></td><td th:text="${a.telephone}"></td>
            </tr>
            <tr th:if="${d.agents.isEmpty()}"><td colspan="4" class="empty">Aucun agent.</td></tr>
        </tbody>
    </table>
    <h2>Matériel du poste</h2>
    <table class="table">
        <thead><tr><th>N° inventaire</th><th>Type</th><th>Nom</th><th>Modèle</th></tr></thead>
        <tbody>
            <tr th:each="m : ${d.materiels}">
                <td th:text="${m.numeroInventaire}"></td><td th:text="${m.type}"></td>
                <td th:text="${m.nom}"></td><td th:text="${m.modele}"></td>
            </tr>
            <tr th:if="${d.materiels.isEmpty()}"><td colspan="4" class="empty">Aucun matériel.</td></tr>
        </tbody>
    </table>
    <p style="margin-top:1rem"><a th:href="@{/postes}">← Liste des postes</a></p>
</main>
</body>
</html>
