<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Postes</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <div class="toolbar">
        <h1 style="margin:0">Postes régionaux</h1>
        <span class="spacer"></span>
        <a class="btn" th:href="@{/postes/nouveau}" th:if="${currentRole == 'ADMIN'}">+ Nouveau poste</a>
    </div>
    <table class="table">
        <thead><tr><th>Code</th><th>Nom</th><th>Région</th><th>Matériel</th><th>Actions</th></tr></thead>
        <tbody>
            <tr th:each="p : ${postes}">
                <td th:text="${p.code}"></td>
                <td><a th:href="@{/postes/{id}(id=${p.id})}" th:text="${p.nom}"></a></td>
                <td th:text="${p.region}"></td>
                <td><span class="badge gold" th:text="${p.nbMateriel}">0</span></td>
                <td><a class="btn small" th:href="@{/postes/{id}(id=${p.id})}">Détail</a> <a class="btn small secondary" th:href="@{/postes/{id}/modifier(id=${p.id})}" th:if="${currentRole == 'ADMIN'}">Modifier</a></td>
            </tr>
            <tr th:if="${postes.isEmpty()}"><td colspan="5" class="empty">Aucun poste enregistré.</td></tr>
        </tbody>
    </table>
</main>
</body>
</html>
