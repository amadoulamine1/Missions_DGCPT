<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Comptes</title><link rel="stylesheet" th:href="@{/css/app.css}"/></head>
<body>
<nav class="topbar" th:replace="~{fragments/layout :: nav}"></nav>
<main class="container">
    <div class="toolbar">
        <h1 style="margin:0">Comptes utilisateurs</h1>
        <span class="spacer"></span>
        <a class="btn" th:href="@{/utilisateurs/nouveau}">+ Nouveau compte</a>
    </div>
    <table class="table">
        <thead><tr><th>Identifiant</th><th>Nom</th><th>Agent lié</th><th>Rôle</th><th>État</th><th>Actions</th></tr></thead>
        <tbody>
            <tr th:each="u : ${utilisateurs}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.nomComplet}"></td>
                <td th:text="${u.agentMatricule != null ? u.agentMatricule : '—'}"></td>
                <td><span class="badge" th:classappend="${u.role == 'ADMIN' ? 'gold' : (u.role == 'CHEF_MISSION' ? 'blue' : 'green')}"
                          th:text="${u.role == 'ADMIN' ? 'Administrateur' : (u.role == 'CHEF_MISSION' ? 'Chef de mission' : 'Agent')}"></span></td>
                <td><span class="badge" th:classappend="${u.actif} ? 'green' : 'red'" th:text="${u.actif} ? 'Actif' : 'Désactivé'"></span></td>
                <td><a class="btn small secondary" th:href="@{/utilisateurs/{id}/modifier(id=${u.id})}">Modifier</a></td>
            </tr>
            <tr th:if="${utilisateurs.isEmpty()}"><td colspan="6" class="empty">Aucun compte.</td></tr>
        </tbody>
    </table>
</main>
</body>
</html>
